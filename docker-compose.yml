services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "50051"
      LOG_LEVEL: INFO
    healthcheck:
      # Checks if the gRPC port is accepting connections
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 5s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: "4"
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      INGESTION_GRPC_HOST: ingestion
      INGESTION_GRPC_PORT: "50051"
      GATEWAY_PORT: "8080"
      LOG_LEVEL: INFO
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-30}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
    restart: unless-stopped

volumes:
  redis_data:
