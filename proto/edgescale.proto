syntax = "proto3";

package edgescale;

service EdgeScaleService {
  // Fire-and-forget heartbeat from edge agents
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Unary text analysis — waits for worker result, returns word_count
  rpc AnalyzeText(AnalyzeTextRequest) returns (AnalyzeTextResponse);

  // Client-to-server streaming file upload — waits for worker result
  rpc UploadAndAnalyzeFile(stream FileChunk) returns (FileAnalysisResponse);
}

message HeartbeatRequest {
  string agent_id = 1;
  int64  timestamp = 2;
  map<string, string> metadata = 3;
}

message HeartbeatResponse {}

message AnalyzeTextRequest {
  string text = 1;
}

message AnalyzeTextResponse {
  string request_id = 1;
  int32  word_count = 2;
}

message FileChunk {
  string file_id     = 1;
  bytes  data        = 2;
  int32  chunk_index = 3;
  bool   is_last     = 4;
  string filename    = 5;
}

message FileAnalysisResponse {
  string file_id    = 1;
  int32  word_count = 2;
}
